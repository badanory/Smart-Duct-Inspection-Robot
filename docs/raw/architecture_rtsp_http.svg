<?xml version="1.0" ?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" style="font-family: Inter, Arial, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>
  <text x="20" y="34" font-size="22" font-weight="bold">RTSP + HTTP/1.1 시스템 구조도 (덕트 로봇 영상 송신 + 추론 흐름)</text>
  <rect x="40" y="70" width="260" height="70" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="170.0" y="97.0" text-anchor="middle" dominant-baseline="middle" font-size="13">로봇 카메라 (Raspberry Pi)</text>
  <text x="170.0" y="113.0" text-anchor="middle" dominant-baseline="middle" font-size="13">H.264 인코더</text>
  <rect x="40" y="160" width="260" height="70" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="170.0" y="187.0" text-anchor="middle" dominant-baseline="middle" font-size="13">RTSP 서버 (예: MediaMTX)</text>
  <text x="170.0" y="203.0" text-anchor="middle" dominant-baseline="middle" font-size="13">(rtp/rtcp)</text>
  <rect x="360" y="115" width="200" height="70" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="460.0" y="142.0" text-anchor="middle" dominant-baseline="middle" font-size="13">사설/현장 네트워크</text>
  <text x="460.0" y="158.0" text-anchor="middle" dominant-baseline="middle" font-size="13">(덕트 환경)</text>
  <rect x="620" y="60" width="250" height="70" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="745.0" y="87.0" text-anchor="middle" dominant-baseline="middle" font-size="13">엣지 추론 노드 (Apple M4 Pro)</text>
  <text x="745.0" y="103.0" text-anchor="middle" dominant-baseline="middle" font-size="13">YOLOv8 추론</text>
  <rect x="900" y="60" width="260" height="70" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="1030.0" y="87.0" text-anchor="middle" dominant-baseline="middle" font-size="13">결과 소비자 (제어 HMI)</text>
  <text x="1030.0" y="103.0" text-anchor="middle" dominant-baseline="middle" font-size="13">HTTP 1.1 REST 폴링/푸시</text>
  <rect x="620" y="200" width="250" height="70" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="745.0" y="227.0" text-anchor="middle" dominant-baseline="middle" font-size="13">클라우드 추론 노드 (AWS g5dn.xlarge)</text>
  <text x="745.0" y="243.0" text-anchor="middle" dominant-baseline="middle" font-size="13">YOLOv8 추론</text>
  <rect x="900" y="200" width="260" height="70" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="1030.0" y="227.0" text-anchor="middle" dominant-baseline="middle" font-size="13">모니터링/저장 (S3, DB)</text>
  <text x="1030.0" y="243.0" text-anchor="middle" dominant-baseline="middle" font-size="13">HTTP 1.1 API</text>
  <rect x="360" y="260" width="200" height="60" rx="10" ry="10" fill="#F5F7FA" stroke="#111827" stroke-width="1.5"/>
  <text x="460.0" y="282.0" text-anchor="middle" dominant-baseline="middle" font-size="13">제어/메타데이터 채널</text>
  <text x="460.0" y="298.0" text-anchor="middle" dominant-baseline="middle" font-size="13">HTTP 1.1 (REST)</text>
  <line x1="300" y1="195" x2="360" y2="150" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="330.0" y="166.5" text-anchor="middle" font-size="12">RTSP (TCP/UDP)</text>
  <line x1="560" y1="150" x2="620" y2="95" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590.0" y="116.5" text-anchor="middle" font-size="12">RTSP 플레이/디코드</text>
  <line x1="560" y1="150" x2="620" y2="235" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590.0" y="186.5" text-anchor="middle" font-size="12">RTSP 릴레이/프록시</text>
  <line x1="870" y1="95" x2="900" y2="95" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="885.0" y="89.0" text-anchor="middle" font-size="12">JSON 결과</text>
  <line x1="870" y1="235" x2="900" y2="235" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="885.0" y="229.0" text-anchor="middle" font-size="12">JSON 결과</text>
  <line x1="460" y1="290" x2="900" y2="230" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="680.0" y="254.0" text-anchor="middle" font-size="12">상태/메타 업로드</text>
  <rect x="40" y="360" width="1120" height="120" rx="10" ry="10" fill="#EEF2FF" stroke="#3730A3" stroke-width="1.5"/>
  <text x="600.0" y="396.0" text-anchor="middle" dominant-baseline="middle" font-size="13">추론/전송 특성 요약</text>
  <text x="600.0" y="412.0" text-anchor="middle" dominant-baseline="middle" font-size="13">- 평균 FPS: 10, RTSP 대역폭(엣지): ~255 kbps, 초기 지연 약 4s 관찰.</text>
  <text x="600.0" y="428.0" text-anchor="middle" dominant-baseline="middle" font-size="13">- 클라우드에서 RTSP 장시간 운용 시 프레임 드롭 증가(최종 누적 손실 보고). 화질 QP 14.6~23.7.</text>
  <text x="600.0" y="444.0" text-anchor="middle" dominant-baseline="middle" font-size="13">- 장점: 낮은 대역폭으로 장시간 송출/동시 접속에 유리. 단점: 초기 지연 및 장시간 시 프레임 드롭.</text>
  <rect x="40" y="500" width="1120" height="160" rx="10" ry="10" fill="#F5F3FF" stroke="#5B21B6" stroke-width="1.5"/>
  <text x="600.0" y="548.0" text-anchor="middle" dominant-baseline="middle" font-size="13">주요 흐름 설명</text>
  <text x="600.0" y="564.0" text-anchor="middle" dominant-baseline="middle" font-size="13">1) 카메라가 H.264로 인코딩 → RTSP 서버 송출</text>
  <text x="600.0" y="580.0" text-anchor="middle" dominant-baseline="middle" font-size="13">2) 엣지/클라우드 노드가 RTSP 세션을 재생(PLAY)하여 프레임 디코딩</text>
  <text x="600.0" y="596.0" text-anchor="middle" dominant-baseline="middle" font-size="13">3) YOLOv8 추론 → 박스/클래스/스코어 산출</text>
  <text x="600.0" y="612.0" text-anchor="middle" dominant-baseline="middle" font-size="13">4) 결과(JSON)와 메타데이터를 HTTP 1.1 REST로 HMI/DB에 전달</text>
</svg>
